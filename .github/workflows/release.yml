name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore MantisMcpServer/MantisMcpServer.csproj

    - name: Build
      run: dotnet build MantisMcpServer/MantisMcpServer.csproj --configuration Release --no-restore

    - name: Test
      run: dotnet test MantisMcpServer.Tests/MantisMcpServer.Tests.csproj --configuration Release --verbosity normal

    - name: Publish
      run: |
        dotnet publish MantisMcpServer/MantisMcpServer.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o ./publish

    - name: Zip Artifact
      run: Compress-Archive -Path ./publish/* -DestinationPath MantisMcpServer-Win64.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: MantisMcpServer-Win64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
